<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 KING OF ROYAL | SAMP SHOP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        :root {
            --primary: #ffd700;
            --primary-dark: #ffaa00;
            --secondary: #00ff88;
            --dark: #0a0a1a;
            --darker: #0f0f2f;
            --light: #1a1a4a;
            --danger: #ff4444;
            --info: #00d4ff;
            --discord: #5865F2;
            --text: #ffffff;
            --text-muted: #a0a0c0;
        }

        body {
            background: linear-gradient(135deg, #0a0a1a, #0f0f2f, #1a1a4a);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        /* پاشخانی جوڵاو بە شین و ڕەش */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0,100,255,0.1) 0%, transparent 30%),
                radial-gradient(circle at 80% 70%, rgba(0,50,150,0.1) 0%, transparent 30%),
                radial-gradient(circle at 40% 50%, rgba(0,212,255,0.1) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }

        /* نوسراوی سەرەوە - Dev KAKAROT - ADOLF */
        .dev-signature {
            position: fixed;
            top: 10px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            padding: 5px 15px;
            border-radius: 30px;
            border: 1px solid var(--primary);
            color: var(--primary);
            font-size: 0.85em;
            font-weight: 500;
            letter-spacing: 1px;
            z-index: 9999;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            font-family: monospace;
        }

        .dev-signature i {
            color: var(--primary);
            margin-left: 8px;
            font-size: 0.9em;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* ===== Top Navigation ===== */
        .top-nav {
            background: rgba(15, 15, 47, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 12px 25px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--primary);
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .welcome-text {
            color: var(--primary);
            font-size: 1.1em;
        }

        .welcome-text i {
            margin-left: 8px;
        }

        .balance {
            background: rgba(10, 10, 26, 0.8);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid var(--secondary);
        }

        .balance i {
            color: var(--secondary);
            margin-left: 8px;
        }

        .balance span {
            color: var(--secondary);
            font-weight: bold;
        }

        .logout-btn {
            background: var(--danger);
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 0.9em;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--danger);
        }

        /* ===== Main Navigation ===== */
        .main-nav {
            background: rgba(15, 15, 47, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 15px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid var(--primary);
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .nav-item {
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            color: var(--text);
        }

        .nav-item:hover {
            background: rgba(255,215,0,0.2);
            color: var(--primary);
        }

        .nav-item.active {
            background: var(--primary);
            color: var(--dark);
        }

        /* ===== Server Bar ===== */
        .server-bar {
            background: rgba(15, 15, 47, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 50px;
            padding: 15px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid var(--primary);
            flex-wrap: wrap;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .server-ip {
            background: rgba(10, 10, 26, 0.8);
            padding: 10px 25px;
            border-radius: 30px;
            font-family: monospace;
            font-size: 1.2em;
            color: var(--primary);
            border: 1px solid var(--primary);
            direction: ltr;
        }

        .server-status {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .online-dot {
            width: 12px;
            height: 12px;
            background: var(--secondary);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0,255,136,0.7); }
            70% { box-shadow: 0 0 0 15px rgba(0,255,136,0); }
            100% { box-shadow: 0 0 0 0 rgba(0,255,136,0); }
        }

        .players-count {
            background: var(--secondary);
            color: var(--dark);
            padding: 5px 20px;
            border-radius: 30px;
            font-weight: bold;
        }

        .discord-link {
            background: var(--discord);
            color: white;
            padding: 10px 25px;
            border-radius: 30px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .discord-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(88, 101, 242, 0.5);
        }

        /* ===== Header ===== */
        .main-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .main-header h1 {
            font-size: 3.5em;
            background: linear-gradient(45deg, var(--primary), var(--primary-dark));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255,215,0,0.5);
            margin-bottom: 10px;
        }

        .main-header p {
            color: var(--text-muted);
            font-size: 1.2em;
        }

        /* ===== Login Box ===== */
        .login-box {
            max-width: 450px;
            margin: 0 auto 40px;
            background: rgba(15, 15, 47, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 40px;
            border: 2px solid var(--primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .login-box h2 {
            color: var(--primary);
            margin-bottom: 30px;
            text-align: center;
            font-size: 2em;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--primary);
            font-weight: 600;
        }

        .input-group input, .input-group select, .input-group textarea {
            width: 100%;
            padding: 15px;
            background: rgba(10, 10, 26, 0.8);
            border: 2px solid var(--light);
            border-radius: 15px;
            color: white;
            font-size: 1.1em;
            transition: all 0.3s;
        }

        .input-group input:focus, .input-group select:focus, .input-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(255,215,0,0.3);
        }

        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 15px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--primary), var(--primary-dark));
            color: var(--dark);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255,215,0,0.4);
        }

        .btn-success {
            background: linear-gradient(45deg, var(--secondary), #00ccff);
            color: var(--dark);
        }

        .btn-danger {
            background: linear-gradient(45deg, var(--danger), #ff8844);
            color: white;
        }

        .btn-info {
            background: var(--info);
            color: white;
        }

        /* ===== Home Page ===== */
        .home-page {
            background: rgba(15, 15, 47, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            border: 1px solid var(--primary);
        }

        .welcome-banner {
            background: linear-gradient(45deg, rgba(255,215,0,0.2), rgba(255,170,0,0.2));
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            color: var(--primary);
            border: 1px solid var(--primary);
        }

        .welcome-banner h2 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .account-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .info-card {
            background: rgba(10, 10, 26, 0.8);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-right: 4px solid var(--primary);
        }

        .info-card i {
            font-size: 2em;
            color: var(--primary);
        }

        .info-card div {
            flex: 1;
        }

        .info-card h4 {
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .info-card p {
            font-size: 1.3em;
            color: var(--primary);
            font-weight: bold;
        }

        /* ===== Shopping Page ===== */
        .shopping-page {
            background: rgba(15, 15, 47, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            border: 1px solid var(--primary);
        }

        .shop-categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }

        .shop-category {
            background: rgba(10, 10, 26, 0.8);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--primary);
        }

        .shop-category h3 {
            color: var(--primary);
            margin-bottom: 20px;
            font-size: 1.4em;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
        }

        .shop-items {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .shop-item {
            background: rgba(15, 15, 47, 0.9);
            border-radius: 12px;
            padding: 15px;
            border-right: 3px solid var(--info);
            position: relative;
        }

        .shop-item-image {
            width: 100%;
            height: 150px;
            background: linear-gradient(45deg, var(--dark), var(--light));
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3em;
            color: var(--primary);
            border: 1px solid var(--primary);
            overflow: hidden;
        }

        .shop-item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }

        .shop-item h4 {
            color: var(--info);
            margin-bottom: 10px;
        }

        .shop-item .price {
            color: var(--secondary);
            font-size: 1.2em;
            font-weight: bold;
            margin: 10px 0;
        }

        .shop-item .location {
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        .buy-btn {
            background: var(--secondary);
            color: var(--dark);
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }

        .buy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--secondary);
        }

        /* ===== Rules Page ===== */
        .rules-page {
            background: rgba(15, 15, 47, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            border: 1px solid var(--primary);
        }

        .rules-list {
            list-style: none;
            margin-top: 20px;
        }

        .rules-list li {
            padding: 15px;
            background: rgba(10, 10, 26, 0.8);
            margin-bottom: 10px;
            border-radius: 10px;
            border-right: 3px solid var(--primary);
        }

        .rules-list li i {
            color: var(--primary);
            margin-left: 10px;
        }

        /* ===== Tutorials Page ===== */
        .tutorials-page {
            background: rgba(15, 15, 47, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            border: 1px solid var(--primary);
        }

        .tutorial-item {
            background: rgba(10, 10, 26, 0.8);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border-right: 3px solid var(--info);
        }

        .tutorial-item h3 {
            color: var(--info);
            margin-bottom: 10px;
        }

        .tutorial-item p {
            color: var(--text-muted);
        }

        /* ===== Code Page ===== */
        .code-page {
            background: rgba(15, 15, 47, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            border: 1px solid var(--primary);
        }

        .code-input-area {
            max-width: 500px;
            margin: 0 auto;
        }

        .code-input-area textarea {
            width: 100%;
            padding: 15px;
            background: rgba(10, 10, 26, 0.8);
            border: 2px solid var(--primary);
            border-radius: 15px;
            color: white;
            font-size: 1.1em;
            min-height: 120px;
            margin-bottom: 20px;
            resize: vertical;
        }

        .code-info {
            background: rgba(10, 10, 26, 0.8);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            color: var(--text-muted);
        }

        .code-info i {
            color: var(--primary);
            margin-left: 8px;
        }

        /* ===== Balance Page ===== */
        .balance-page {
            background: rgba(15, 15, 47, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 30px;
            border: 1px solid var(--primary);
        }

        .transfer-form {
            max-width: 500px;
            margin: 0 auto;
        }

        .user-search {
            background: rgba(10, 10, 26, 0.8);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .user-search input {
            width: 100%;
            padding: 12px;
            background: rgba(15, 15, 47, 0.9);
            border: 1px solid var(--primary);
            border-radius: 8px;
            color: white;
        }

        .transfer-history {
            margin-top: 30px;
        }

        .history-item {
            background: rgba(10, 10, 26, 0.8);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-right: 3px solid var(--info);
        }

        .history-item .positive {
            color: var(--secondary);
        }

        .history-item .negative {
            color: var(--danger);
        }

        /* ===== Owner Panel ===== */
        .owner-panel {
            background: rgba(15, 15, 47, 0.95);
            backdrop-filter: blur(10px);
            border: 2px solid var(--primary);
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .owner-panel h2 {
            color: var(--primary);
            margin-bottom: 25px;
            font-size: 2em;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .owner-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .owner-tab {
            padding: 12px 30px;
            background: rgba(10, 10, 26, 0.8);
            border: 1px solid var(--primary);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .owner-tab:hover, .owner-tab.active {
            background: var(--primary);
            color: var(--dark);
        }

        .owner-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 25px;
        }

        .owner-card {
            background: rgba(10, 10, 26, 0.8);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid var(--primary);
        }

        .owner-card h3 {
            color: var(--primary);
            margin-bottom: 20px;
        }

        .item-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(15, 15, 47, 0.9);
            margin-bottom: 10px;
            border-radius: 10px;
            border-right: 3px solid var(--primary);
        }

        .item-info {
            flex: 1;
        }

        .item-info strong {
            color: var(--primary);
        }

        .item-price {
